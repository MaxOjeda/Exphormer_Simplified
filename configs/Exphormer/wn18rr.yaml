dataset:
  format: KGC
  name: WN18RR
  dir: ./datasets
  task: link_pred
  task_type: kgc_ranking
  node_encoder: True
  node_encoder_name: KGCNode
  node_encoder_bn: False   # BN on zeros+one-hot init would suppress the signal
  edge_encoder: True
  edge_encoder_name: RelationEmbedding
  edge_encoder_bn: False

kgc:
  reciprocal: True
  subgraph_hops: 2
  max_nodes: 500
  eval_full_graph: True
  eval_batch_size: 8         # BF16 halves memory; B=4→0.7GB so B=8 is safe on H100
  train_full_graph: True
  train_batch_size: 16
  train_steps_per_epoch: 3257    # ceil(52101 / 16) = 30% coverage, same data as B=1 30%
  label_smoothing: 0.0

gt:
  layer_type: Exphormer
  layers: 3
  n_heads: 4
  dim_hidden: 32
  dim_edge: 32
  dropout: 0.1
  attn_dropout: 0.1
  layer_norm: True
  batch_norm: False
  use_query_conditioning: True     # condition attention scores on query relation r

gnn:
  head: kgc
  layers_pre_mp: 0
  layers_post_mp: 0
  dim_inner: 32                    # must equal gt.dim_hidden
  dropout: 0.1

prep:
  exp: True
  exp_deg: 3
  exp_algorithm: Random-d
  exp_max_num_iters: 100
  exp_check_spectral: False   # skip eigenvalue loop: ~100× faster per-subgraph
  add_edge_index: True
  num_virt_node: 0

posenc_LapPE:
  enable: False
posenc_EquivStableLapPE:
  enable: False

optim:
  optimizer: adamW
  base_lr: 0.0002              # full-epoch gradients are more stable → can use higher LR
  weight_decay: 1.0e-4
  max_epoch: 100               # 100 epochs at 30% coverage ≈ 30 full-epoch equivalents
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
  clip_grad_norm: True         # prevent large gradient updates at high LR

train:
  batch_size: 256
  eval_period: 2
  ckpt_period: 10
  enable_ckpt: True
  ckpt_best: True
  grad_checkpoint: True   # per-layer activation recompute: saves ~25GB VRAM at cost of +33% compute

model:
  type: MultiModel
  loss_fun: cross_entropy

metric_best: mrr
metric_agg: argmax

wandb:
  use: False          # override with wandb.use True in sbatch scripts
  entity: maxojeda
  project: exphormer-kgc
